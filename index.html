<!DOCTYPE html>
<html>
<head>
    <title>Parth | Digital Marketing Executive</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 15px;
            width: 380px;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 25px rgba(0, 255, 213, 0.3);
            text-align: center;
        }

        .logo {
            width: 120px;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 5px;
        }

        .typing {
            font-size: 18px;
            color: #00ffd5;
            height: 25px;
            margin-bottom: 10px;
        }

        .institute {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 15px;
        }

        h2 {
            margin: 15px 0 8px;
        }

        ul {
            list-style: none;
        }

        ul li {
            margin: 6px 0;
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 22px;
            background: #00ffd5;
            color: black;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: white;
            box-shadow: 0 0 15px #00ffd5;
        }
    </style>
</head>

<body>

    <div class="card">
        <!-- Logo file same folder me hona chahiye -->
        <img src="cbits-logo.png" alt="CBITS Logo" class="logo">

        <h1>Parth</h1>

        <p class="typing">
            <span id="typing-text"></span>
        </p>

        <p class="institute">
            Digital Marketing Executive <br>
            CBITS Institute, Sector 34A, Chandigarh
        </p>

        <h2>Core Skills</h2>
        <ul>
            <li>Lead Generation</li>
            <li>Meta Ads</li>
            <li>Google Ads</li>
            <li>SEO Optimization</li>
        </ul>

        <a href="#" class="btn">Contact Me</a>
    </div>

    <script>
        const textArray = [
            "Digital Marketing Executive",
            "Lead Generation Specialist",
            "Meta & Google Ads Expert",
            "Performance Marketing"
        ];

        let index = 0;
        let charIndex = 0;
        let currentText = "";
        let isDeleting = false;

        function typeEffect() {
            currentText = textArray[index];

            if (!isDeleting) {
                document.getElementById("typing-text").textContent =
                    currentText.substring(0, charIndex + 1);
                charIndex++;

                if (charIndex === currentText.length) {
                    isDeleting = true;
                    setTimeout(typeEffect, 1000);
                    return;
                }
            } else {
                document.getElementById("typing-text").textContent =
                    currentText.substring(0, charIndex - 1);
                charIndex--;

                if (charIndex === 0) {
                    isDeleting = false;
                    index = (index + 1) % textArray.length;
                }
            }

            setTimeout(typeEffect, isDeleting ? 50 : 100);
        }

        document.addEventListener("DOMContentLoaded", typeEffect);
    </script>

</body>
</html>
